<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>协理员面试练习</title>

<style>
  :root {
    --bg: #080b11; --surface: #10141d; --surface2: #181c28; --border: #232836;
    --text: #e4e8f1; --text2: #8b90a5; --text3: #555a70;
    --blue: #5b9cf5; --green: #34d399; --red: #f87171; --orange: #fb923c;
    --yellow: #fbbf24; --purple: #a78bfa;
    --radius: 12px; --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .badge {
    font-size: 11px; color: var(--text2); background: var(--surface2);
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
  }
  .browser-warn {
    display: none; background: #2d1f0c; border-bottom: 1px solid #5c3d0e;
    padding: 10px 24px; font-size: 13px; color: var(--yellow); text-align: center;
  }
  .browser-warn.show { display: block; }

  /* Settings Panel */
  .settings-panel {
    max-width: 1280px; margin: 0 auto; padding: 0 24px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    overflow: hidden; max-height: 0; transition: max-height 0.3s ease;
  }
  .settings-panel.open { max-height: 500px; }
  .settings-inner { padding: 16px 0; }
  .settings-row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .settings-row:last-child { margin-bottom: 0; }
  .settings-row label { font-size: 13px; color: var(--text2); min-width: 80px; flex-shrink: 0; }
  .settings-row select, .settings-row input {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: inherit;
    outline: none;
  }
  .settings-row select:focus, .settings-row input:focus { border-color: var(--blue); }
  .settings-row input[type="number"] { width: 70px; text-align: center; }
  .settings-row input[type="file"] { display: none; }
  .tag {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .tag-blue { background: rgba(91,156,245,0.15); color: var(--blue); }
  .tag-green { background: rgba(52,211,153,0.15); color: var(--green); }
  .tag-orange { background: rgba(251,146,60,0.15); color: var(--orange); }
  .bank-questions-count { font-size: 11px; color: var(--text3); }

  .main {
    max-width: 1280px; margin: 0 auto; padding: 20px 24px 60px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }
  @media (max-width: 860px) {
    .main { grid-template-columns: 1fr; }
    .settings-row { flex-direction: column; align-items: flex-start; }
  }

  .question-card {
    grid-column: 1 / -1;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .question-card .q-icon { font-size: 22px; flex-shrink: 0; }
  .question-card .q-body { flex: 1; min-width: 0; }
  .question-card .q-progress { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .question-card .q-text { font-size: 15px; line-height: 1.6; color: var(--text); }
  .question-card .q-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .camera-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .camera-view {
    position: relative; background: #000; aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
  }
  .camera-view video { width: 100%; height: 100%; object-fit: cover; display: block; }
#previewVideo { transform: scaleX(-1); }
  .camera-placeholder {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: var(--text3);
  }
  .camera-placeholder svg { width: 48px; height: 48px; opacity: 0.35; }
  .camera-placeholder span { font-size: 13px; }
  .rec-indicator {
    position: absolute; top: 12px; left: 12px; display: none; align-items: center;
    gap: 6px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600; color: var(--red);
  }
  .rec-indicator.active { display: flex; }
  .rec-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--red);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .timer-overlay {
    position: absolute; bottom: 12px; right: 12px;
    font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums;
    color: #fff; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 6px;
    letter-spacing: 1px; display: flex; align-items: center; gap: 6px;
  }
  .timer-overlay.stopped { color: var(--text3); }
  .timer-overlay.countdown-warn { color: var(--orange); }
  .timer-mode-tag {
    font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 3px;
    letter-spacing: 0;
  }
  .timer-mode-tag.up { background: rgba(52,211,153,0.2); color: var(--green); }
  .timer-mode-tag.down { background: rgba(251,146,60,0.2); color: var(--orange); }

  .controls {
    display: flex; align-items: center; gap: 10px; padding: 14px 16px;
    border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 5px; padding: 10px 18px;
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
    font-family: inherit; white-space: nowrap;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
  .btn-start { background: var(--green); color: #000; }
  .btn-start:hover { background: #2dc48d; }
  .btn-pause { background: var(--orange); color: #000; }
  .btn-pause:hover { background: #e88626; }
  .btn-stop { background: var(--red); color: #fff; }
  .btn-stop:hover { background: #e05a5a; }
  .btn-next { background: var(--blue); color: #000; }
  .btn-next:hover { background: #4a8de6; }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border); color: var(--text2);
  }
  .btn-ghost:hover { border-color: var(--text3); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-xs { padding: 4px 8px; font-size: 11px; }

  .transcript-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    display: flex; flex-direction: column; min-height: 320px;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .panel-header h3 { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .transcript-body {
    flex: 1; padding: 16px; overflow-y: auto; font-size: 14px;
    line-height: 1.8; color: var(--text2); min-height: 200px; max-height: 400px;
  }
  .transcript-body .final { color: var(--text); }
  .transcript-body .interim { color: var(--text3); font-style: italic; }
  .q-block-done { margin-bottom: 10px; opacity: 0.8; }
  .q-block-current { }
  .transcript-body .q-sep {
    font-size: 12px; font-weight: 600; color: var(--text2);
    border-top: 1px solid var(--border);
    margin: 10px 0 6px; padding-top: 8px; display: block;
  }
  .q-block-done .q-sep { color: var(--text3); }
  .transcript-empty { text-align: center; padding: 40px 20px; color: var(--text3); }
  .transcript-empty svg { width: 36px; height: 36px; margin-bottom: 8px; opacity: 0.3; }

  .history-section {
    grid-column: 1 / -1;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 20px;
  }
  .history-section h3 {
    font-size: 14px; font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item-block { margin-bottom: 6px; }
  .history-item-block .history-item { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
  .history-item-block:has(.history-transcript[style*="display: block"]) .history-item { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
  .history-item {
    display: flex; align-items: center; gap: 14px; padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 13px; flex-wrap: wrap; border-radius: var(--radius-sm);
  }
  .history-item .h-time { font-weight: 600; color: var(--text); min-width: 50px; }
  .history-item .h-date { color: var(--text3); flex: 1; font-size: 12px; min-width: 120px; }
  .history-item .h-dur { color: var(--text2); margin-right: 4px; }
  .history-empty { text-align: center; padding: 20px; color: var(--text3); font-size: 13px; }

  .transcript-body::-webkit-scrollbar { width: 4px; }
  .transcript-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 20px; font-size: 13px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }

  .warning-box {
    grid-column: 1 / -1;
    background: rgba(251,146,60,0.08); border: 1px solid rgba(251,146,60,0.2);
    border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px;
    color: var(--orange); display: flex; align-items: center; gap: 8px;
  }
  .session-summary {
    grid-column: 1 / -1;
    background: rgba(52,211,153,0.06); border: 1px solid rgba(52,211,153,0.2);
    border-radius: var(--radius); padding: 16px 20px; text-align: center;
  }
  .session-summary h3 { font-size: 16px; margin-bottom: 6px; color: var(--green); }
  .session-summary .summary-stats { font-size: 13px; color: var(--text2); line-height: 1.8; }

  /* ===== Auth ===== */
  .auth-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
  .auth-overlay.hidden { display: none; }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 32px 28px; width: 360px; max-width: 90vw;
  }
  .auth-card h2 { font-size: 20px; margin-bottom: 20px; text-align: center; }
  .auth-card .field { margin-bottom: 14px; }
  .auth-card label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .auth-card input, .auth-card select {
    width: 100%; padding: 10px 12px; border-radius: 6px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    font-size: 14px; font-family: inherit; outline: none;
  }
  .auth-card input:focus, .auth-card select:focus { border-color: var(--blue); }
  .auth-card .gender-row { display: flex; gap: 10px; }
  .auth-card .gender-row select { flex: 1; }
  .auth-card .btn-full {
    width: 100%; padding: 11px; border-radius: 6px; font-size: 15px; font-weight: 600;
    cursor: pointer; border: none; font-family: inherit; margin-top: 6px;
  }
  .auth-card .btn-primary { background: var(--blue); color: #fff; }
  .auth-card .btn-primary:hover { background: #4a8de6; }
  .auth-card .switch { text-align: center; margin-top: 14px; font-size: 13px; color: var(--text3); }
  .auth-card .switch a { color: var(--blue); cursor: pointer; text-decoration: none; }
  .auth-card .error { color: var(--red); font-size: 12px; margin-top: 6px; display: none; }
  .user-bar {
    display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text2);
  }
  .user-bar .logout-btn {
    background: none; border: 1px solid var(--border); color: var(--text3);
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit;
  }
  .user-bar .logout-btn:hover { border-color: var(--red); color: var(--red); }
  .sync-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 3px;
  }
  .sync-badge.ok { background: rgba(52,211,153,0.15); color: var(--green); }
  .sync-badge.err { background: rgba(248,113,113,0.15); color: var(--red); }

</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2 id="authTitle">登录</h2>
    <div class="field"><label>邮箱</label><input type="email" id="authEmail" placeholder="your@email.com"></div>
    <div class="field"><label>密码</label><input type="password" id="authPassword" placeholder="输入密码"></div>
    <div class="field" id="genderField" style="display:none">
      <label>性别</label>
      <select id="authGender"><option value="male">男</option><option value="female">女</option></select>
    </div>
    <div class="error" id="authError"></div>
    <button class="btn-full btn-primary" id="authBtn" onclick="handleAuth()">登录</button>
    <div class="switch"><a id="authSwitch" onclick="toggleAuthMode()">还没有账号？注册</a></div>
  </div>
</div>

<div class="header">
  <h1>🎤 协理员面试练习</h1>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" id="btnSettings" onclick="toggleSettings()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      设置
    </button>
    <span class="badge" id="browserBadge">检测中…</span>
    <div class="user-bar" id="userBar" style="display:none">
      <span id="userEmail"></span>
      <span class="sync-badge ok" id="syncBadge">☁ 已同步</span>
      <button class="logout-btn" onclick="showChangePwd()">改密</button>
      <button class="logout-btn" onclick="handleLogout()">退出</button>
    </div>
    <div class="pwd-change" id="pwdChange" style="display:none;margin-top:6px;display:none;flex;gap:6px;align-items:center">
      <input type="password" id="oldPwd" placeholder="旧密码" style="width:90px;padding:3px 6px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:3px;font-size:11px">
      <input type="password" id="newPwd" placeholder="新密码" style="width:90px;padding:3px 6px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:3px;font-size:11px">
      <button class="logout-btn" onclick="changePassword()" style="color:var(--green);border-color:var(--green)">确认</button>
      <span id="pwdMsg" style="font-size:10px"></span>
    </div>
  </div>
</div>
<div class="browser-warn" id="browserWarn">
  ⚠️ 当前浏览器不支持语音识别功能，建议使用 Chrome 或 Edge 获得完整体验。录制和计时功能正常可用。
</div>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-inner">
    <div class="settings-row">
      <label>题库</label>
      <select id="bankSelect" onchange="selectBank()" style="min-width:180px"></select>
      <label class="btn btn-ghost btn-xs" style="cursor:pointer">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        上传题库(.txt)
        <input type="file" accept=".txt" onchange="uploadBank(this)" style="display:none">
      </label>
      <button class="btn btn-ghost btn-xs" id="btnDeleteBank" onclick="deleteBank()" style="display:none" title="删除当前题库">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
      <span class="bank-questions-count" id="bankCount">20 题</span>
    </div>
    <div class="settings-row">
      <label>每次答题数</label>
      <input type="number" id="questionCount" min="1" max="50" value="3" onchange="saveConfig()">
      <span style="font-size:11px;color:var(--text3)">道题</span>
      <label style="margin-left:16px">计时模式</label>
      <select id="timeMode" onchange="onTimeModeChange()" style="min-width:100px">
        <option value="stopwatch">正计时</option>
        <option value="countdown">倒计时</option>
      </select>
      <span id="timeLimitWrap">
        <label id="timeLimitLabel">总时长</label>
        <input type="number" id="timeLimit" min="1" max="30" value="3" onchange="saveConfig()">
        <span style="font-size:11px;color:var(--text3)">分钟</span>
      </span>
    </div>
  </div>
</div>

<div class="main">
  <!-- Question Card -->
  <div class="question-card">
    <span class="q-icon">📋</span>
    <div class="q-body">
      <div class="q-progress" id="questionProgress"></div>
      <div class="q-text" id="questionText">设置好题库和题目数量后，点击"开始练习"</div>
    </div>
    <div class="q-actions">
      <button class="btn btn-next btn-sm" id="btnStartSession" onclick="startSession()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        开始练习
      </button>
      <button class="btn btn-ghost btn-sm" id="btnNextQuestion" onclick="nextQuestionInSession()" style="display:none">
        下一题 →
      </button>
    </div>
  </div>

  <!-- Session summary (hidden) -->
  <div class="session-summary" id="sessionSummary" style="display:none"></div>

  <!-- Camera Panel -->
  <div class="camera-panel">
    <div class="camera-view" id="cameraView">
      <video id="previewVideo" autoplay playsinline muted></video>
      <video id="playbackVideo" controls style="display:none"></video>
      <div class="camera-placeholder" id="cameraPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15 10l4.55-2.6A1 1 0 0121 8.27v7.46a1 1 0 01-1.45.88L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        <span>点击"开始录制"启动摄像头</span>
      </div>
      <canvas id="faceCanvas" style="display:none;position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2"></canvas>
      <div class="face-overlay" id="faceOverlay" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse 30% 40% at 50% 35%, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%)"></div>
      <div class="rec-indicator" id="recIndicator">
        <span class="rec-dot"></span>录制中
      </div>
      <div class="timer-overlay stopped" id="timerDisplay">00:00</div>
    </div>
    <div class="controls">
      <button class="btn btn-start" id="btnStart" onclick="startRecording()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        开始录制
      </button>
      <button class="btn btn-pause" id="btnPause" onclick="pauseRecording()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        暂停
      </button>
      <button class="btn btn-ghost btn-sm" id="btnFaceToggle" onclick="toggleFaceEffect()" title="拟态特效">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
        拟态
      </button>
      <button class="btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
        停止录制
      </button>

// ----- Encryption (Web Crypto API, AES-GCM) -----
async function generateEncryptionKey() {
  // Use getRandomValues + importKey instead of generateKey to avoid
  // browser extension conflicts with async crypto message channels
  const raw = crypto.getRandomValues(new Uint8Array(32));
  return await crypto.subtle.importKey('raw', raw, { name: 'AES-GCM' }, true, ['encrypt', 'decrypt']);
}

async function exportKey(key) {
  const raw = await crypto.subtle.exportKey('raw', key);
  return btoa(String.fromCharCode(...new Uint8Array(raw)));
}

async function importKey(base64Key) {
  const raw = Uint8Array.from(atob(base64Key), c => c.charCodeAt(0));
  return await crypto.subtle.importKey('raw', raw, { name: 'AES-GCM' }, true, ['encrypt', 'decrypt']);
}

async function encryptText(key, plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encoded = new TextEncoder().encode(plaintext);
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
  return {
    iv: btoa(String.fromCharCode(...iv)),
    data: btoa(String.fromCharCode(...new Uint8Array(ciphertext)))
  };
}

async function decryptText(key, ivB64, dataB64) {
  const iv = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
  const ciphertext = Uint8Array.from(atob(dataB64), c => c.charCodeAt(0));
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return new TextDecoder().decode(decrypted);
}

async function uploadRecordingToCloud(record) {
  if (!encryptionKey || !currentUser) return;
  try {
    const transcriptEnc = await encryptText(encryptionKey, record.transcript || '');
    const metadata = JSON.stringify({
      question: record.question, duration: record.duration,
      durStr: record.durStr, date: record.date, sessionAnswers: record.sessionAnswers
    });
    const metadataEnc = await encryptText(encryptionKey, metadata);

    // Upload video
    let videoPath = null;
    if (record.blob && record.blob.size > 0) {
      const fileName = `${currentUser.id}/${record.id}.webm`;
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/recordings/${fileName}`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'video/webm' },
        body: record.blob
      });
      if (res.ok) videoPath = fileName;
    }

    // Insert row
    const { error } = await sbApi('POST', '/rest/v1/recordings', {
      id: record.id, user_id: currentUser.id,
      encrypted_transcript: transcriptEnc.data,
      encrypted_metadata: metadataEnc.data,
      video_storage_path: videoPath,
      iv: transcriptEnc.iv,
      created_at: new Date().toISOString()
    });

    document.getElementById('syncBadge').className = 'sync-badge err';
  }
}

async function loadRecordingsFromCloud() {

      `/rest/v1/recordings?select=*&user_id=eq.${currentUser.id}&order=created_at.desc`);

        });

function startSession() {
  const bank = questionBanks[currentBank] || [];
  if (bank.length === 0) {
    showToast('当前题库为空');
    return;
  }
  const count = Math.min(config.questionCount, bank.length);
  // Shuffle and pick
  const shuffled = [...bank].sort(() => Math.random() - 0.5);
  sessionQuestions = shuffled.slice(0, count);
  sessionIndex = 0;
  sessionAnswers = [];
  sessionActive = true;

  // Reset camera area for new session (in case previous playback was showing)
  previewVideo.style.display = '';
  playbackVideo.style.display = 'none';
  cameraPlaceholder.style.display = '';

  btnStartSession.style.display = 'none';
  sessionSummary.style.display = 'none';
  updateQuestionDisplay();
  showToast(`练习开始，共 ${count} 题`);
}

function updateQuestionDisplay() {
  if (sessionIndex >= sessionQuestions.length) {
    finishSession();
    return;
  }
  const total = sessionQuestions.length;
  questionProgress.textContent = `第 ${sessionIndex + 1} / ${total} 题`;
  questionText.textContent = sessionQuestions[sessionIndex];
  btnStart.disabled = false;
  // Show next button if currently recording (so user can advance without stopping)
  if (isRecording) {
    btnNextQuestion.style.display = '';
    btnNextQuestion.textContent = '下一题 →';
  }
}

function nextQuestionInSession() {
  // Save current question's transcript including pending interim text
  const currentQ = sessionQuestions[sessionIndex] || '';
  let transcriptText = transcripts.map(s => s.text).join('\n');
  if (currentInterim) {
    transcriptText += (transcriptText ? '\n' : '') + '【未确认】' + currentInterim;
  }
  const elapsed = config.timeMode === 'countdown'
    ? (config.timeLimit * 60) - timerSeconds
    : timerSeconds;
  sessionAnswers.push({
    question: currentQ,
    transcript: transcriptText,
    duration: Math.max(0, elapsed)
  });

  // Advance to next question
  sessionIndex++;
  // Reset transcripts for the new question
  transcripts = [];
  currentInterim = '';
  btnDownload.disabled = true;

  // Abort recognition immediately to prevent late results bleeding into next Q
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    // Start fresh recognition session for the new question
    setTimeout(() => {
      if (isRecording && !isPaused) {
        try { recognition.start(); } catch(e) {}
      }
    }, 150);
  }

  renderTranscript();
  updateQuestionDisplay();
  showToast('已切换到下一题');
}

function finishSession() {
  // If still recording, save current question then stop
  if (isRecording) {
    if (sessionIndex < sessionQuestions.length && sessionAnswers.length === sessionIndex) {
      const currentQ = sessionQuestions[sessionIndex] || '';
      let transcriptText = transcripts.map(s => s.text).join('\n');
      if (currentInterim) {
        transcriptText += (transcriptText ? '\n' : '') + '【未确认】' + currentInterim;
      }
      const elapsed = config.timeMode === 'countdown'
        ? (config.timeLimit * 60) - timerSeconds
        : timerSeconds;
      sessionAnswers.push({
        question: currentQ,
        transcript: transcriptText,
        duration: Math.max(0, elapsed)
      });
    }
    stopRecording();
  } else {
    showSessionComplete();
  }
}

function showSessionComplete() {
  sessionActive = false;
  btnNextQuestion.style.display = 'none';
  btnStartSession.style.display = '';
  questionProgress.textContent = '';
  questionText.textContent = '练习完成！点击"开始练习"再来一轮';

  const totalTime = sessionAnswers.reduce((s, a) => s + a.duration, 0);
  let summaryHTML = `<h3>🎉 练习完成</h3><div class="summary-stats">`;
  summaryHTML += `共回答 ${sessionAnswers.length} 题 · 总用时 ${formatDuration(totalTime)}<br>`;
  summaryHTML += `<button class="btn btn-ghost btn-sm" onclick="downloadFullTranscript()" style="margin-top:8px">导出全部文字稿</button>`;
  summaryHTML += `</div>`;
  sessionSummary.innerHTML = summaryHTML;
  sessionSummary.style.display = '';

  btnDownload.disabled = sessionAnswers.length === 0;
  btnDownload._sessionData = { answers: sessionAnswers, totalTime };

  showToast('本轮练习已完成');
}

// ============ Speech Recognition ============
function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    browserBadge.textContent = '⚠ 语音转写不支持';
    browserWarn.classList.add('show');
    return;
  }
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const r = event.results[i];
      if (r.isFinal) {
        transcripts.push({ final: true, text: r[0].transcript.trim() });
      } else {
        interim += r[0].transcript;
      }
    }
    currentInterim = interim;
    renderTranscript();
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') {
      try { recognition.start(); } catch(e) {}
      return;
    }
    if (event.error === 'aborted') return;
  };

  recognition.onend = () => {
    // Immediately restart to minimize transcription gaps
    if (isRecording && !isPaused && sessionIndex < sessionQuestions.length) {
      setTimeout(() => { try { recognition.start(); } catch(e) {} }, 50);
    }
  };

  browserBadge.textContent = '✓ 语音转写就绪';
}

function renderTranscript() {
  let html = '';
  // Show completed (saved) questions
  for (let i = 0; i < sessionAnswers.length; i++) {
    const a = sessionAnswers[i];
    html += `<div class="q-block-done">`;
    html += `<span class="q-sep">✓ 第${i+1}题：${escapeHtml(a.question)}</span>`;
    if (a.transcript) {
      html += `<span class="final">${escapeHtml(a.transcript)}</span> `;
    } else {
      html += `<span class="final" style="color:var(--text3)">（无转写内容）</span>`;
    }
    html += `</div>`;
  }
  // Current question - only if not already saved
  // Only show current Q if it hasn't been saved yet (sessionAnswers.length <= sessionIndex)
  if (sessionIndex < sessionQuestions.length && sessionAnswers.length <= sessionIndex) {
    html += `<div class="q-block-current">`;
    html += `<span class="q-sep">● 第${sessionIndex+1}题：${escapeHtml(sessionQuestions[sessionIndex])}</span>`;
    for (const seg of transcripts) {
      html += `<span class="final">${escapeHtml(seg.text)}</span> `;
    }
    if (currentInterim) {
      html += `<span class="interim">${escapeHtml(currentInterim)}</span>`;
    }
    html += `</div>`;
  }
  if (transcripts.length > 0 || currentInterim || sessionAnswers.length > 0) {
    transcriptEmpty.style.display = 'none';
  }
  transcriptBody.innerHTML = html || '';
  transcriptBody.scrollTop = transcriptBody.scrollHeight;
}

// ============ Camera ============
async function initCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    previewVideo.srcObject = mediaStream;
    cameraPlaceholder.style.display = 'none';
    browserBadge.textContent = '✓ 摄像头就绪';
  } catch (err) {
    cameraPlaceholder.innerHTML = '<span>无法访问摄像头，请检查权限设置</span>';
    browserBadge.textContent = '⚠ 摄像头未授权';
    throw err;
  }
}

// ============ Recording ============
async function startRecording() {
  if (isRecording) return;
  if (!sessionActive) {
    showToast('请先点击"开始练习"');
    return;
  }

  try {
    if (!mediaStream) await initCamera();
    // Ensure camera preview is visible (not stuck on playback)
    previewVideo.style.display = '';
    playbackVideo.style.display = 'none';

    // If restarting recording on a question already saved, remove stale entry
    if (sessionAnswers.length > sessionIndex) {
      sessionAnswers.pop();
    }

    recordedChunks = [];
    transcripts = [];
    currentInterim = '';
    timerSeconds = 0;

    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9' : 'video/webm';
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      saveRecording(url, blob);
    };

    mediaRecorder.start(1000);
    isRecording = true;
    isPaused = false;

    // Start fresh recognition session
    if (recognition) {
      try { recognition.abort(); } catch(e) {}
      setTimeout(() => { try { recognition.start(); } catch(e) {} }, 100);
    }

    // Start timer
    if (config.timeMode === 'countdown') {
      timerSeconds = config.timeLimit * 60;
    } else {
      timerSeconds = 0;
    }
    timerInterval = setInterval(() => {
      if (config.timeMode === 'countdown') {
        timerSeconds--;
        if (timerSeconds <= 0) {
          timerSeconds = 0;
          stopRecording();
          showToast('时间到，录制已自动停止');
          return;
        }
      } else {
        timerSeconds++;
      }
      updateTimerDisplay();
    }, 1000);

    updateUI();
    updateTimerDisplay();
    transcriptEmpty.style.display = 'none';
    renderTranscript();
    // Show next button while recording so user can advance between questions
    btnNextQuestion.style.display = '';
    btnNextQuestion.textContent = '下一题 →';
  } catch (err) {
    showToast('启动失败：' + err.message);
  }
}

function pauseRecording() {
  if (!isRecording) return;
  if (isPaused) {
    mediaRecorder.resume();
    if (recognition) { try { recognition.start(); } catch(e) {} }
    timerInterval = setInterval(() => {
      if (config.timeMode === 'countdown') {
        timerSeconds--;
        if (timerSeconds <= 0) { timerSeconds = 0; stopRecording(); return; }
      } else { timerSeconds++; }
      updateTimerDisplay();
    }, 1000);
    isPaused = false;
    showToast('录制已继续');
  } else {
    mediaRecorder.pause();
    if (recognition) { try { recognition.stop(); } catch(e) {} }
    clearInterval(timerInterval);
    timerInterval = null;
    isPaused = true;
    showToast('录制已暂停');
  }
  updateUI();
}

function stopRecording() {
  if (!isRecording) return;
  // Save current question transcript if not saved yet (e.g. stopping mid-question)
  if (sessionIndex < sessionQuestions.length && sessionAnswers.length === sessionIndex) {
    const currentQ = sessionQuestions[sessionIndex] || '';
    let transcriptText = transcripts.map(s => s.text).join('\n');
    if (currentInterim) {
      transcriptText += (transcriptText ? '\n' : '') + '【未确认】' + currentInterim;
    }
    const elapsed = config.timeMode === 'countdown'
      ? (config.timeLimit * 60) - timerSeconds
      : timerSeconds;
    sessionAnswers.push({
      question: currentQ,
      transcript: transcriptText,
      duration: Math.max(0, elapsed)
    });
  }
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  clearInterval(timerInterval);
  timerInterval = null;
  btnNextQuestion.style.display = 'none';
  mediaRecorder.stop();
  isRecording = false;
  isPaused = false;
  updateUI();
}

function updateUI() {
  if (isRecording && !isPaused) {
    btnStart.disabled = true;
    btnPause.disabled = false;
    btnStop.disabled = false;
    btnPause.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 暂停';
    recIndicator.classList.add('active');
    timerDisplay.classList.remove('stopped');
  } else if (isRecording && isPaused) {
    btnStart.disabled = true;
    btnPause.disabled = false;
    btnStop.disabled = false;
    btnPause.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> 继续';
    recIndicator.classList.remove('active');
    timerDisplay.classList.add('stopped');
  } else {
    btnStart.disabled = !sessionActive;
    btnPause.disabled = true;
    btnStop.disabled = true;
    btnPause.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 暂停';
    recIndicator.classList.remove('active');
    timerDisplay.classList.add('stopped');
  }
}

function updateTimerDisplay() {
  const abs = Math.abs(timerSeconds);
  const m = Math.floor(abs / 60).toString().padStart(2, '0');
  const s = (abs % 60).toString().padStart(2, '0');
  let prefix = '';
  if (config.timeMode === 'countdown') {
    prefix = '<span class="timer-mode-tag down">倒</span> ';
    if (timerSeconds <= 30 && isRecording) {
      timerDisplay.classList.add('countdown-warn');
    } else {
      timerDisplay.classList.remove('countdown-warn');
    }
  } else {
    prefix = '<span class="timer-mode-tag up">正</span> ';
    timerDisplay.classList.remove('countdown-warn');
  }
  timerDisplay.innerHTML = prefix + `${m}:${s}`;
}

// ============ Save & History ============
function saveRecording(url, blob) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
  const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const totalTime = sessionAnswers.reduce((s, a) => s + a.duration, 0);
  const durStr = formatDuration(Math.max(0, totalTime));

  // Build combined transcript with question markers
  let combinedTranscript = '';
  for (let i = 0; i < sessionAnswers.length; i++) {
    combinedTranscript += `第${i+1}题：${sessionAnswers[i].question}\n`;
    combinedTranscript += sessionAnswers[i].transcript || '（无转写内容）';
    if (i < sessionAnswers.length - 1) combinedTranscript += '\n\n';
  }

  // Build question summary for history
  const qSummary = sessionAnswers.map((a, i) => `Q${i+1}: ${a.question}`).join(' | ');

  const record = {
    id: Date.now(),
    date: `${dateStr} ${timeStr}`,
    duration: Math.max(0, totalTime),
    durStr,
    url,
    blob,
    transcript: combinedTranscript,
    question: qSummary,
    sessionAnswers: [...sessionAnswers]
  };

  recordingHistory.unshift(record);
  renderHistory();

  previewVideo.style.display = 'none';
  playbackVideo.style.display = 'block';
  playbackVideo.src = url;

  btnDownload.disabled = false;
  btnDownload._sessionData = { answers: sessionAnswers, totalTime };

  showSessionComplete();
  showToast('录制已保存');
  // Sync to cloud
  if (currentUser) uploadRecordingToCloud(record);
}

function renderHistory() {
  if (recordingHistory.length === 0) {
    historyList.innerHTML = '<div class="history-empty">暂无录制记录</div>';
    return;
  }
  historyList.innerHTML = recordingHistory.map(r => `
    <div class="history-item-block" id="hitem-${r.id}">
      <div class="history-item">
        <span class="h-time">${r.durStr}</span>
        <span class="h-date">${r.date}</span>
        <span style="font-size:11px;color:var(--text3);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(r.question)}</span>
        <button class="btn btn-ghost btn-xs" onclick="playHistory(${r.id})">回放</button>
        <button class="btn btn-ghost btn-xs" onclick="downloadHistoryVideo(${r.id})">下载</button>
        <button class="btn btn-ghost btn-xs" onclick="toggleTranscript(${r.id})">文字稿</button>
        <button class="btn btn-ghost btn-xs" onclick="deleteRecording(${r.id})" style="color:var(--red)">删除</button>
      </div>
      <div class="history-transcript" id="htrans-${r.id}" style="display:none;padding:8px 14px;font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap;background:var(--bg);border-radius:0 0 8px 8px;border:1px solid var(--border);border-top:none">${escapeHtml(r.transcript || '（无文字稿）')}</div>
    </div>
  `).join('');
}

async function playHistory(id) {
  let record = recordingHistory.find(r => r.id === id);
  if (!record) return;
  record = await loadVideoForRecord(record);
  previewVideo.style.display = 'none';
  playbackVideo.style.display = 'block';
  if (record.blob) {
    playbackVideo.src = URL.createObjectURL(record.blob);
  } else if (record.url) {
    playbackVideo.src = record.url;
  }
  playbackVideo.play();
  if (record.transcript) {
    transcriptBody.innerHTML = `<span class="final">${escapeHtml(record.transcript)}</span>`;
    transcriptEmpty.style.display = 'none';
  }
  showToast('正在回放 ' + record.durStr);
}

async function deleteRecording(id) {
  const idx = recordingHistory.findIndex(r => r.id === id);
  if (idx === -1) return;
  if (!confirm('确定删除这条录制记录？')) return;
  const record = recordingHistory[idx];
  // Delete from cloud
  if (currentUser && accessToken) {
    try {
      await sbApi('DELETE', `/rest/v1/recordings?id=eq.${id}`);
      if (record._storagePath) {
        await fetch(`${SUPABASE_URL}/storage/v1/object/recordings/${record._storagePath}`, {
          method: 'DELETE',
          headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + accessToken}
        });
      }
    } catch(e) { console.warn('Delete from cloud error:', e); }
  }
  recordingHistory.splice(idx, 1);
  renderHistory();
  showToast('已删除');
}

function downloadFullTranscript() {
  let data = btnDownload._sessionData;
  if (!data || !data.answers || data.answers.length === 0) {
    // Try to build from current state
    data = { answers: sessionAnswers, totalTime: 0 };
  }
  const now = new Date().toISOString().slice(0, 10);
  let content = `面试练习文字稿 - ${now}\n`;
  content += `题库：${currentBank}\n`;
  content += `共 ${data.answers.length} 题\n`;
  content += `${'─'.repeat(40)}\n\n`;

  for (let i = 0; i < data.answers.length; i++) {
    const a = data.answers[i];
    content += `第${i + 1}题：${a.question}\n`;
    content += `用时：${formatDuration(a.duration)}\n`;
    content += `回答：\n${a.transcript || '（无转写内容）'}\n`;
    content += `\n${'─'.repeat(40)}\n\n`;
  }

  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `面试练习-${now}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('文字稿已下载');
}

// ============ Helpers ============
function formatDuration(sec) {
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m > 0 ? `${m}分${s}秒` : `${s}秒`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showChangePwd() {
  const el = document.getElementById('pwdChange');
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

async function changePassword() {
  const oldPwd = document.getElementById('oldPwd').value;
  const newPwd = document.getElementById('newPwd').value;
  const msgEl = document.getElementById('pwdMsg');
  if (!oldPwd || !newPwd) { msgEl.textContent = '请填写新旧密码'; msgEl.style.color = 'var(--red)'; return; }
  if (newPwd.length < 6) { msgEl.textContent = '新密码至少6位'; msgEl.style.color = 'var(--red)'; return; }
  try {
    // Verify old password first
    const { data: vfy, error: vfyErr } = await sbApi('POST', '/auth/v1/token?grant_type=password', { email: currentUser.email, password: oldPwd });
    if (vfyErr) { msgEl.textContent = '旧密码错误'; msgEl.style.color = 'var(--red)'; return; }
    // Update to new password
    const res = await fetch(SUPABASE_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: newPwd })
    });
    if (res.ok) {
      msgEl.textContent = '密码已修改';
      msgEl.style.color = 'var(--green)';
      document.getElementById('oldPwd').value = '';
      document.getElementById('newPwd').value = '';
      setTimeout(() => { document.getElementById('pwdChange').style.display = 'none'; }, 1500);
    } else {
      const err = await res.json().catch(() => ({}));
      msgEl.textContent = '修改失败：' + (err.msg || '请重试');
      msgEl.style.color = 'var(--red)';
    }
  } catch(e) { msgEl.textContent = '错误：' + e.message; msgEl.style.color = 'var(--red)'; }
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastEl._timeout);
  toastEl._timeout = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

// ============ Init ============
initSpeechRecognition();
loadBanks();
refreshBankSelect();
refreshBankUI();
loadConfig();

</script>
